name: Bug Report
description: Report a bug in CodeHub
title: "[Bug]: "
labels: [bug]
assignees:
  - Adnan-Umar
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please review previous closed issues before submitting to avoid duplicates.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: Explain what went wrong
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Submit code on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The solution should be pushed to GitHub
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which coding platform were you using?
      options:
        - LeetCode
        - HackerRank
        - GeeksForGeeks
        - Code360
        - Other
      validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Logs
      description: Any relevant output from the browser console (look for [CodeHub] prefixed messages)
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true